spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

document:
  fetch:
    timeout-seconds: 2

caches:
  use-cases:
    documentsByVin:
      expiration-ms: 10000

logging:
  level:
    com.example: DEBUG

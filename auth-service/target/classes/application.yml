server:
  port: 8081
  shutdown: graceful
  compression:
    enabled: true
    min-response-size: 1024

spring:
  lifecycle:
    timeout-per-shutdown-phase: 15s
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/authdb?useSSL=false&allowPublicKeyRetrieval=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  sql:
    init:
      mode: never

security:
  jwt:
    secret: ${JWT_SECRET:change-this-to-strong-secret-key-min-32-chars}
    expiration-seconds: 600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

